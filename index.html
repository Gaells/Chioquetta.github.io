<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meu Portfólio</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: Arial, sans-serif;
        background-color: #f4f4f4;
        line-height: 1.6;
      }
      header {
        background-color: #333;
        color: #fff;
        padding: 1rem 0;
        text-align: center;
      }
      header h1 {
        margin-bottom: 0.5rem;
      }
      nav ul {
        list-style: none;
        display: flex;
        justify-content: center;
      }
      nav ul li {
        margin: 0 15px;
      }
      nav ul li a {
        color: #fff;
        text-decoration: none;
        font-weight: bold;
      }
      section {
        padding: 2rem;
      }
      .container {
        max-width: 960px;
        margin: auto;
        background-color: #fff;
        padding: 2rem;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      }
      footer {
        background-color: #333;
        color: #fff;
        text-align: center;
        padding: 1rem 0;
        position: fixed;
        left: 0;
        bottom: 0;
        width: 100%;
      }
      @media (max-width: 600px) {
        nav ul {
          flex-direction: column;
        }
        nav ul li {
          margin: 10px 0;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Meu Portfólio</h1>
      <nav>
        <ul>
          <li><a href="#sobre">Sobre</a></li>
          <li><a href="#projetos">Projetos</a></li>
          <li><a href="#contato">Contato</a></li>
        </ul>
      </nav>
    </header>

    <section id="sobre">
      <div class="container">
        <h2>Sobre Mim</h2>
        <p>
          Aqui você pode inserir uma breve descrição sobre você, seu background, suas
          habilidades e o que você faz.
        </p>
      </div>
    </section>

    <section id="projetos">
      <div class="container">
        <h2>Projetos</h2>
        <ul>
          <li><a href="#">Projeto 1</a></li>
          <li><a href="#">Projeto 2</a></li>
          <li><a href="#">Projeto 3</a></li>
        </ul>
      </div>
    </section>

    <footer>
      <p>&copy; 2025 Gabriel Chioquetta. Todos os direitos reservados.</p>
    </footer>
  </body>
</html>
